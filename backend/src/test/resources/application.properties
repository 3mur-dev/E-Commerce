spring.datasource.url=jdbc:h2:mem:ecommerce;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.config.import=
spring.flyway.enabled=false
spring.data.redis.repositories.enabled=false
logging.level.root=WARN
logging.level.org.springframework=ERROR
app.jwt.secret=test-jwt-secret-for-tests
stripe.secret.key=test-stripe-secret
stripe.webhook.secret=test-stripe-webhook-secret

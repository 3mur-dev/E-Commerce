<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - Shoppio'">Product Details - Shoppio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            900: '#1e3a8a'
                        }
                    },
                    boxShadow: {
                        soft: '0 14px 32px -16px rgba(15, 23, 42, 0.35)',
                        card: '0 24px 45px -22px rgba(15, 23, 42, 0.35)'
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .stock-high { background: #10b981; }
        .stock-medium { background: #f59e0b; }
        .stock-low { background: #ef4444; }
        .stock-out { background: #6b7280; }
        .gradient-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 text-slate-900">

<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="absolute -top-24 -left-16 h-80 w-80 rounded-full bg-primary-200/55 blur-3xl"></div>
    <div class="absolute top-1/3 -right-20 h-[26rem] w-[26rem] rounded-full bg-indigo-100/70 blur-3xl"></div>
    <div class="absolute -bottom-32 left-1/3 h-96 w-96 rounded-full bg-blue-100/70 blur-3xl"></div>
</div>

<th:block th:replace="~{fragments/header :: storeHeader('products')}"></th:block>

<main class="pb-16 pt-10 sm:pt-12">
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <a th:href="@{/products}"
           class="inline-flex items-center gap-2 rounded-2xl border border-white/80 bg-white/85 px-4 py-2 text-sm font-semibold text-slate-700 shadow-soft backdrop-blur-sm transition hover:-translate-y-0.5 hover:border-primary-300 hover:text-primary-700">
            <i class="fas fa-arrow-left text-xs"></i>
            Back to Products
        </a>

        <div class="mt-6 grid grid-cols-1 gap-6 lg:grid-cols-[1.05fr_0.95fr]">
            <article class="group overflow-hidden rounded-[1.75rem] border border-white/80 bg-white/90 shadow-card backdrop-blur-sm">
                <div class="relative h-[300px] overflow-hidden bg-gradient-to-br from-slate-100 via-white to-blue-100 sm:h-[420px]">
                    <img th:src="${product.imageUrl ?: '/images/default.webp'}"
                         th:alt="${product.name}"
                         class="h-full w-full object-cover object-center transition duration-700 group-hover:scale-105"
                         loading="lazy"
                         decoding="async">

                    <div th:if="${product.stock >= 10}"
                         class="stock-high absolute left-4 top-4 rounded-full px-4 py-2 text-xs font-semibold text-white shadow">
                        <i class="fas fa-check-circle mr-1"></i><span th:text="${product.stock}">12</span> In Stock
                    </div>
                    <div th:if="${product.stock >= 5 and product.stock < 10}"
                         class="stock-medium absolute left-4 top-4 rounded-full px-4 py-2 text-xs font-semibold text-white shadow">
                        <i class="fas fa-exclamation-circle mr-1"></i><span th:text="${product.stock}">7</span> In Stock
                    </div>
                    <div th:if="${product.stock > 0 and product.stock < 5}"
                         class="stock-low absolute left-4 top-4 rounded-full px-4 py-2 text-xs font-semibold text-white shadow">
                        <i class="fas fa-clock mr-1"></i><span th:text="${product.stock}">3</span> Left
                    </div>
                    <div th:if="${product.stock <= 0}"
                         class="stock-out absolute left-4 top-4 rounded-full px-4 py-2 text-xs font-semibold text-white shadow">
                        Out of Stock
                    </div>
                </div>
            </article>

            <article class="rounded-[1.75rem] border border-white/80 bg-white/90 p-6 shadow-card backdrop-blur-sm sm:p-8">
                <p class="inline-flex items-center rounded-full border border-primary-200 bg-primary-50 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-primary-700"
                   th:text="${product.categoryName ?: 'Uncategorized'}">
                    Category
                </p>

                <h1 class="mt-4 text-2xl font-bold tracking-tight text-slate-900 sm:text-4xl"
                    th:text="${product.name}">
                    Product Name
                </h1>

                <p class="mt-5 text-4xl font-black tracking-tight text-primary-700"
                   th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}">
                    99.99
                </p>

                <div class="mt-6 grid grid-cols-1 gap-3 sm:grid-cols-2">
                    <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
                        <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Category</p>
                        <p class="mt-1 text-sm font-semibold text-slate-800" th:text="${product.categoryName ?: 'Uncategorized'}">Laptops</p>
                    </div>
                    <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
                        <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Stock</p>
                        <p class="mt-1 text-sm font-semibold text-slate-800" th:text="${product.stock}">12</p>
                    </div>
                </div>

                <div class="mt-8 flex flex-col gap-3 sm:flex-row">
                    <button type="button"
                            id="detailsAddToCartButton"
                            th:disabled="${product.stock <= 0}"
                            class="inline-flex flex-1 items-center justify-center rounded-2xl bg-gradient-to-r from-primary-600 to-primary-700 px-6 py-3.5 text-sm font-semibold text-white shadow-lg transition-all duration-300 hover:-translate-y-0.5 hover:shadow-xl disabled:cursor-not-allowed disabled:opacity-50 disabled:hover:translate-y-0">
                        <i class="fas fa-cart-plus mr-2"></i>
                        <span th:if="${product.stock > 0}">Add to Cart</span>
                        <span th:if="${product.stock <= 0}">Out of Stock</span>
                    </button>

                    <a th:href="@{/products}"
                       class="inline-flex items-center justify-center rounded-2xl border border-slate-200 bg-white px-6 py-3.5 text-sm font-semibold text-slate-700 transition hover:border-primary-300 hover:text-primary-700">
                        <i class="fas fa-store mr-2"></i>
                        Back to Products
                    </a>
                </div>
            </article>
        </div>
    </section>
</main>

<footer class="gradient-card mt-10 py-10 text-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
        <p class="text-sm font-medium text-blue-100 sm:text-base">&copy; 2026 Omar's Shop. All rights reserved.</p>
        <div class="mt-4 flex flex-wrap items-center justify-center gap-x-6 gap-y-2 text-sm text-blue-100/90">
            <a href="/privacy" class="transition hover:text-white">Privacy Policy</a>
            <a href="/terms" class="transition hover:text-white">Terms of Service</a>
            <a href="/about" class="transition hover:text-white">About</a>
            <a href="/support" class="transition hover:text-white">Support</a>
        </div>
    </div>
</footer>

<script>
    const mobileMenuButton = document.getElementById('mobileMenuButton');
    const mobileMenu = document.getElementById('mobileMenu');
    if (mobileMenuButton && mobileMenu) {
        mobileMenuButton.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            const expanded = mobileMenuButton.getAttribute('aria-expanded') === 'true';
            mobileMenuButton.setAttribute('aria-expanded', String(!expanded));
        });
    }

    const accountMenuButton = document.getElementById('accountMenuButton');
    const accountMenu = document.getElementById('accountMenu');
    if (accountMenuButton && accountMenu) {
        accountMenuButton.addEventListener('click', () => {
            accountMenu.classList.toggle('hidden');
            const expanded = accountMenuButton.getAttribute('aria-expanded') === 'true';
            accountMenuButton.setAttribute('aria-expanded', String(!expanded));
        });

        document.addEventListener('click', (event) => {
            if (!accountMenu.contains(event.target) && !accountMenuButton.contains(event.target)) {
                accountMenu.classList.add('hidden');
                accountMenuButton.setAttribute('aria-expanded', 'false');
            }
        });
    }

    const detailsAddToCartButton = document.getElementById('detailsAddToCartButton');
    if (detailsAddToCartButton && !detailsAddToCartButton.disabled) {
        const addToCartLabel = detailsAddToCartButton.querySelector('span');
        const initialLabel = addToCartLabel ? addToCartLabel.textContent : '';
        detailsAddToCartButton.addEventListener('click', () => {
            detailsAddToCartButton.classList.add('scale-[0.99]');
            setTimeout(() => detailsAddToCartButton.classList.remove('scale-[0.99]'), 120);
            if (addToCartLabel) {
                addToCartLabel.textContent = 'Added to Cart';
                setTimeout(() => {
                    addToCartLabel.textContent = initialLabel;
                }, 1100);
            }
        });
    }
</script>

</body>
</html>

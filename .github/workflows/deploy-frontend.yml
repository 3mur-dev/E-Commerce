name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Vercel
    env:
      VERCEL_ORG_ID: team_aIsMzsOUfUKfuGzCDcNSe0LG
      VERCEL_PROJECT_ID: prj_XEmM6lOyFRol20eAlOetsLU6B3FJ

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing required Vercel token."
            exit 1
          fi

      - name: Use Node.js 20.19+
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to Vercel
        run: vercel frontend --prod --token=${{ secrets.VERCEL_TOKEN }} --yes

      - name: Notify deployment
        if: success()
        run: echo "Frontend deployed successfully to Vercel"

      - name: Notify failure
        if: failure()
        run: echo "Frontend deployment failed"
